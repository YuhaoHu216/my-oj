spring:
  application:
    name: my-oj-user-service
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_oj
    username: root
    password: Zf9@Qv7!Lm2Xc8$HpT8+rK!2pWq9@Vx6$Mn
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

server:
  address: 0.0.0.0
  port: 8102
  forward-headers-strategy: NONE
  servlet:
    session:
      cookie:
        max-age: 2592000
        path: /api

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    path: /v2/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: space.huyuhao.myojuser.controller
